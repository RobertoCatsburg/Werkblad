<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Buikspierplan Tracker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 20px; }
.container { max-width: 800px; margin: 0 auto; }
h1 { text-align: center; font-size: 1.8rem; margin-bottom: 8px; color: #38bdf8; }
.subtitle { text-align: center; color: #94a3b8; margin-bottom: 30px; font-size: 0.9rem; }
.phase-indicator { display: flex; gap: 8px; margin-bottom: 24px; }
.phase-bar { flex: 1; height: 8px; border-radius: 4px; background: #1e293b; position: relative; overflow: hidden; cursor: pointer; }
.phase-bar .fill { height: 100%; border-radius: 4px; transition: width 0.5s; }
.phase-bar:nth-child(1) .fill { background: #22c55e; }
.phase-bar:nth-child(2) .fill { background: #eab308; }
.phase-bar:nth-child(3) .fill { background: #ef4444; }
.phase-label { display: flex; justify-content: space-between; margin-bottom: 20px; font-size: 0.75rem; color: #64748b; }
.card { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 16px; }
.card h2 { font-size: 1.1rem; margin-bottom: 16px; color: #f8fafc; }
.week-selector { display: flex; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.week-btn { padding: 8px 14px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #94a3b8; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; }
.week-btn:hover { border-color: #38bdf8; color: #38bdf8; }
.week-btn.active { background: #38bdf8; color: #0f172a; border-color: #38bdf8; font-weight: 600; }
.checklist { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.check-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #0f172a; border-radius: 8px; cursor: pointer; transition: background 0.2s; }
.check-item:hover { background: #1a2540; }
.check-item input { display: none; }
.checkmark { width: 22px; height: 22px; border: 2px solid #475569; border-radius: 6px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; }
.check-item input:checked ~ .checkmark { background: #22c55e; border-color: #22c55e; }
.check-item input:checked ~ .checkmark::after { content: '\2713'; color: white; font-size: 14px; }
.check-item span { font-size: 0.85rem; }
.measurements { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 12px; }
.measure-input { display: flex; flex-direction: column; gap: 4px; }
.measure-input label { font-size: 0.75rem; color: #94a3b8; }
.measure-input input { padding: 10px; border: 1px solid #334155; border-radius: 8px; background: #0f172a; color: #e2e8f0; font-size: 1rem; text-align: center; }
.measure-input input:focus { outline: none; border-color: #38bdf8; }
.score { text-align: center; padding: 20px; }
.score-number { font-size: 3rem; font-weight: 700; color: #38bdf8; }
.score-label { color: #94a3b8; font-size: 0.85rem; }
.score-bar { height: 8px; background: #0f172a; border-radius: 4px; margin-top: 12px; overflow: hidden; }
.score-bar .fill { height: 100%; background: linear-gradient(90deg, #ef4444, #eab308, #22c55e); border-radius: 4px; transition: width 0.5s; }
.btn-save { display: block; width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 8px; transition: background 0.2s; }
.btn-save:hover { background: #7dd3fc; }
.history { margin-top: 12px; }
.history-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #1e293b; font-size: 0.85rem; }
.history-row .week-label { color: #94a3b8; }
.history-row .values { color: #e2e8f0; }
.countdown { text-align: center; margin-bottom: 24px; padding: 16px; background: linear-gradient(135deg, #1e293b, #0f172a); border-radius: 12px; border: 1px solid #334155; }
.countdown .days { font-size: 2.5rem; font-weight: 700; color: #38bdf8; }
.countdown .label { color: #94a3b8; font-size: 0.85rem; }
@media (max-width: 600px) { .checklist { grid-template-columns: 1fr; } .measurements { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
<h1>Buikspierplan Tracker</h1>
<p class="subtitle">28 juni - 5 september 2026</p>

<div class="countdown">
<div class="days" id="countdown-days">70</div>
<div class="label">dagen resterend</div>
</div>

<div class="phase-indicator">
<div class="phase-bar"><div class="fill" id="phase1-fill"></div></div>
<div class="phase-bar"><div class="fill" id="phase2-fill"></div></div>
<div class="phase-bar"><div class="fill" id="phase3-fill"></div></div>
</div>
<div class="phase-label">
<span>Fase 1: Fundament</span>
<span>Fase 2: Opbouw</span>
<span>Fase 3: Verfijning</span>
</div>

<div class="week-selector" id="week-selector"></div>

<div class="card">
<h2>Dagelijkse Checklist</h2>
<div class="checklist" id="checklist"></div>
</div>

<div class="card">
<h2>Metingen</h2>
<div class="measurements">
<div class="measure-input">
<label>Gewicht (kg)</label>
<input type="number" step="0.1" id="weight" placeholder="--">
</div>
<div class="measure-input">
<label>Buikomvang (cm)</label>
<input type="number" step="0.1" id="waist" placeholder="--">
</div>
<div class="measure-input">
<label>Energie (1-10)</label>
<input type="number" min="1" max="10" id="energy" placeholder="--">
</div>
</div>
</div>

<div class="card">
<div class="score">
<div class="score-number" id="score-display">0/49</div>
<div class="score-label">weekscores</div>
<div class="score-bar"><div class="fill" id="score-fill"></div></div>
</div>
</div>

<button class="btn-save" onclick="saveWeek()">Opslaan</button>

<div class="card history">
<h2>Geschiedenis</h2>
<div id="history-list"></div>
</div>
</div>

<script>
const ITEMS = [
'Training gedaan', 'Eiwit gehaald', 'Calorieen op schema',
'2.5L+ water', 'Geen suiker/alcohol', '7-8 uur slaap', 'Creatine genomen'
];
const DAYS = ['Ma','Di','Wo','Do','Vr','Za','Zo'];
const START = new Date('2026-06-28');
const END = new Date('2026-09-05');

let currentWeek = 1;
let data = JSON.parse(localStorage.getItem('absplan') || '{}');

function init() {
  updateCountdown();
  renderWeekSelector();
  renderChecklist();
  updateScore();
  updatePhases();
  renderHistory();
}

function updateCountdown() {
  const now = new Date();
  const diff = Math.max(0, Math.ceil((END - now) / (1000*60*60*24)));
  document.getElementById('countdown-days').textContent = diff;
}

function renderWeekSelector() {
  const el = document.getElementById('week-selector');
  el.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const btn = document.createElement('button');
    btn.className = 'week-btn' + (i === currentWeek ? ' active' : '');
    btn.textContent = 'W' + i;
    btn.onclick = () => { currentWeek = i; renderWeekSelector(); renderChecklist(); loadMeasurements(); updateScore(); };
    el.appendChild(btn);
  }
}

function getKey(week, day, item) { return `w${week}_d${day}_${item}`; }

function renderChecklist() {
  const el = document.getElementById('checklist');
  el.innerHTML = '';
  DAYS.forEach((day, di) => {
    ITEMS.forEach((item, ii) => {
      const key = getKey(currentWeek, di, ii);
      const label = document.createElement('label');
      label.className = 'check-item';
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = data[key] || false;
      cb.onchange = () => { data[key] = cb.checked; localStorage.setItem('absplan', JSON.stringify(data)); updateScore(); };
      const mark = document.createElement('div');
      mark.className = 'checkmark';
      const span = document.createElement('span');
      span.textContent = day + ': ' + item;
      label.appendChild(cb);
      label.appendChild(mark);
      label.appendChild(span);
      el.appendChild(label);
    });
  });
  loadMeasurements();
}

function loadMeasurements() {
  const w = data[`w${currentWeek}_measures`] || {};
  document.getElementById('weight').value = w.weight || '';
  document.getElementById('waist').value = w.waist || '';
  document.getElementById('energy').value = w.energy || '';
}

function updateScore() {
  let checked = 0;
  DAYS.forEach((_, di) => {
    ITEMS.forEach((_, ii) => {
      if (data[getKey(currentWeek, di, ii)]) checked++;
    });
  });
  document.getElementById('score-display').textContent = checked + '/49';
  document.getElementById('score-fill').style.width = (checked/49*100) + '%';
}

function updatePhases() {
  const now = new Date();
  const phase1End = new Date('2026-07-19');
  const phase2End = new Date('2026-08-09');
  const elapsed1 = Math.min(100, Math.max(0, (now - START) / (phase1End - START) * 100));
  const elapsed2 = now > phase1End ? Math.min(100, Math.max(0, (now - phase1End) / (phase2End - phase1End) * 100)) : 0;
  const elapsed3 = now > phase2End ? Math.min(100, Math.max(0, (now - phase2End) / (END - phase2End) * 100)) : 0;
  document.getElementById('phase1-fill').style.width = elapsed1 + '%';
  document.getElementById('phase2-fill').style.width = elapsed2 + '%';
  document.getElementById('phase3-fill').style.width = elapsed3 + '%';
}

function saveWeek() {
  data[`w${currentWeek}_measures`] = {
    weight: document.getElementById('weight').value,
    waist: document.getElementById('waist').value,
    energy: document.getElementById('energy').value
  };
  localStorage.setItem('absplan', JSON.stringify(data));
  renderHistory();
  alert('Week ' + currentWeek + ' opgeslagen!');
}

function renderHistory() {
  const el = document.getElementById('history-list');
  el.innerHTML = '';
  for (let i = 1; i <= 10; i++) {
    const m = data[`w${i}_measures`];
    if (m && (m.weight || m.waist || m.energy)) {
      let checked = 0;
      DAYS.forEach((_, di) => { ITEMS.forEach((_, ii) => { if (data[getKey(i, di, ii)]) checked++; }); });
      const row = document.createElement('div');
      row.className = 'history-row';
      row.innerHTML = `<span class="week-label">Week ${i}</span><span class="values">${m.weight||'-'}kg | ${m.waist||'-'}cm | Energie: ${m.energy||'-'} | Score: ${checked}/49</span>`;
      el.appendChild(row);
    }
  }
  if (!el.children.length) el.innerHTML = '<p style="color:#64748b;font-size:0.85rem;padding:8px 0;">Nog geen metingen opgeslagen.</p>';
}

init();
</script>
</body>
</html>
